{% extends 'base.html' %}
<!-- content -->
{% block content %}
<!-- Header-->
<header class="bg-dark py-5">
  <div class="container px-4 px-lg-5 my-5">
    <div class="text-center text-white" id="banner">
      <h1 class="display-4 fw-bolder">Login</h1>
      <p class="lead fw-normal text-white-50 mb-0">Log In To Your Account</p>
    </div>
  </div>
</header>
<div class="container mt-4">
  <div class="row">
    <div class="col-md-4 offset-md-4">
      <img
        src="https://img.freepik.com/premium-vector/user-icon-human-person-symbol-social-profile-icon-avatar-login-sign-web-user-symbol-neumorphic-ui-ux-white-user-interface-web-button-neumorphism-vector-eps-10_399089-2757.jpg?w=360"
        alt="no image"
        height="80px"
        class="mx-auto d-block mb-4 mt-2"
      />
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-4">
          <input
            type="text"
            class="form-control"
            name="username"
            placeholder="Enter Your Username"
          />
        </div>
        <div class="mb-4">
          <input
            type="password"
            class="form-control"
            name="password"
            placeholder="Enter Your Password"
          />
        </div>

        <button type="submit" class="btn btn-secondary mb-5 w-100" name="login">
          Login
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
