{% extends 'base.html' %}
<!-- content -->
{% block content %}
<!-- Header-->
<header class="bg-dark py-4">
  <div class="container px-4 px-lg-5 my-5">
    <div class="text-center text-white" id="banner">
      <h1 class="display-4 fw-bolder">Change Password</h1>
      <p class="lead fw-normal text-white-50 mb-0">Update Your Password..</p>
    </div>
  </div>
</header>
<div class="container mt-4">
  <div class="row">
    <div class="col-md-4 offset-md-4">
      <form method="post" action="{% url 'update_password' %}">
        {% csrf_token %}
        <!--  -->
        {{form.as_p}}
        <input
          type="submit"
          value="Update Password"
          class="btn btn-secondary w-100 mb-3"
        />
      </form>
    </div>
  </div>
</div>
{% endblock %}
